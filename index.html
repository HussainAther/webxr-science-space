<!DOCTYPE html>
<html>
<head>
  <title>WebXR Science Space</title>
  <meta charset="UTF-8">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script>
  <script src="./brain-viewer.js"></script>
  <script src="./molecule-viewer.js"></script>
  <script src="./data-wall.js"></script>
  <style>
    body { margin: 0; }
  </style>
</head>
<body>
  <a-scene>
    <a-entity id="cameraRig" position="0 1.6 0">
      <a-camera></a-camera>
    </a-entity>

    <a-entity position="0 1.5 -3">
      <a-text value="Welcome to the WebXR Science Space" color="#FFF" align="center"></a-text>
    </a-entity>

    <a-entity brain-viewer position="-1 1 -3"></a-entity>
    <a-entity molecule-viewer position="1 1 -3"></a-entity>
    <a-entity data-wall position="0 0 -5"></a-entity>

    <!-- README Info Panel -->
    <a-entity position="-3 1.5 -4">
      <a-plane color="#333" height="2" width="3">
        <a-text 
          value="🗪 WebXR Science Space\nVisualize EEGs, molecules & data in 3D.\nMIT License."
          align="center"
          width="2.5"
          color="#FFF"
          position="0 0 0.01">
        </a-text>
      </a-plane>
    </a-entity>

    <!-- Contributors Wall Panel -->
    <a-entity position="3 1.5 -4">
      <a-plane color="#444" width="2.5" height="1.5">
        <a-text 
          value="👥 Contributors:\n- HussainAther\n- OpenCollabBot\n- You?"
          align="center"
          width="2"
          color="#FFF"
          position="0 0 0.01">
        </a-text>
      </a-plane>
    </a-entity>

    <a-sky color="#222"></a-sky>
  </a-scene>
</body>
</html>
